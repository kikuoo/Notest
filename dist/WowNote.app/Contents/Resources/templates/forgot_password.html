<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WowNote - パスワード再設定</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/landing.css') }}">
    <style>
        body { background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { width: 100%; max-width: 400px; padding: 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .logo-center { display: flex; justify-content: center; margin-bottom: 30px; }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .success-message { color: #28a745; background-color: #e9f7ef; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-center">
                <img src="{{ url_for('static', filename='img/app_icon.png') }}" alt="WowNote Logo" style="width: 60px; height: 60px; border-radius: 12px;">
            </div>
            <h2>パスワードの再設定</h2>
            
            <div id="forgotSuccess" class="success-message" style="display: none;"></div>
            
            <form id="forgotForm" onsubmit="handleForgotPassword(event)">
                <p style="font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5;">
                    ご登録のメールアドレスを入力してください。パスワード再設定用のリンクをお送りします。
                </p>
                <div id="forgotError" class="auth-error" style="display: none; color: red; margin-bottom: 15px; font-size: 14px;"></div>
                <div class="auth-form-group" style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 5px;">メールアドレス</label>
                    <input type="email" id="forgotEmail" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;" required>
                </div>
                <button type="submit" id="forgotSubmit" class="btn-primary" style="width: 100%; padding: 12px; font-weight: bold; border-radius: 6px;">再設定メールを送信</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px; font-size: 14px;">
                <a href="{{ url_for('login_view') }}" style="color: #666; text-decoration: none;">ログイン画面に戻る</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
